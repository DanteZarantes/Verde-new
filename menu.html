<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path fill='%234a9c6e' d='M50 10 C30 10 20 30 20 50 C20 70 30 90 50 90 C70 90 80 70 85 55 C90 40 80 25 70 15 C65 8 58 5 50 10 Z'/><path fill='%23a8e6a1' d='M50 20 C40 20 30 35 28 50 C26 65 35 80 50 80 C65 80 74 65 72 50 C70 35 60 20 50 20 Z'/><path fill='%235ecc7a' d='M50 30 L45 40 L50 55 L55 40 Z'/></svg>">
    <title>Tavola-Verde Menu | Our Dishes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #1a4a2e 0%, #0d2818 100%);
            min-height: 100vh;
            color: #f0f0f0;
            line-height: 1.6;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 40, 24, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 2px solid rgba(77, 156, 110, 0.3);
            transition: all 0.3s ease;
        }

         .category-nav {
             position: fixed;
             top: 85px;
             left: 0;
             right: 0;
             padding: 10px 0;
             z-index: 997;
         }

        .category-nav::before,
        .category-nav::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 40px;
            pointer-events: none;
            z-index: 1;
        }

        .category-nav::before {
            left: 0;
            background: linear-gradient(90deg, rgba(10, 32, 18, 0.9) 0%, transparent 100%);
        }

        .category-nav::after {
            right: 0;
            background: linear-gradient(-90deg, rgba(10, 32, 18, 0.9) 0%, transparent 100%);
        }

        .category-nav-list {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
            flex-wrap: nowrap;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
            width: max-content;
        }

        .category-nav-item {
            display: inline-flex;
            align-items: center;
            padding: 10px 16px;
            background: rgba(77, 156, 110, 0.2);
            border: 1.5px solid rgba(77, 156, 110, 0.4);
            border-radius: 20px;
            color: #c5f0c5;
            font-size: 0.85em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: capitalize;
            letter-spacing: 0.3px;
            white-space: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            scroll-snap-align: start;
        }

        .category-nav-item:hover {
            background: rgba(77, 156, 110, 0.25);
            border-color: #4a9c6e;
            color: #7dd87d;
            transform: translateY(-2px);
        }

        .category-nav-item:active {
            transform: scale(0.95);
        }

        .category-nav-item.active {
            background: linear-gradient(135deg, #4a9c6e 0%, #3d8c5e 100%);
            border-color: #5ecc7a;
            color: white;
            box-shadow: 0 4px 15px rgba(77, 156, 110, 0.4);
            transform: translateY(-2px);
        }

        .category-nav-item.all.active {
            background: linear-gradient(135deg, #7dd87d 0%, #5ecc7a 100%);
        }

        /* Adjust main content to account for sticky category nav */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 140px 20px 20px;
        }

        .navbar.scrolled {
            background: rgba(13, 40, 24, 0.98);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .navbar-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .navbar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            font-weight: 700;
            color: #7dd87d;
            text-decoration: none;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(125, 216, 125, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-logo::before {
            content: '🍃';
            font-size: 1.2em;
        }

        .navbar-menu {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .navbar-menu a {
            color: #c5f0c5;
            text-decoration: none;
            font-size: 1em;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding: 8px 0;
            position: relative;
        }

        .navbar-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #7dd87d;
            transition: width 0.3s ease;
        }

        .navbar-menu a:hover {
            color: #7dd87d;
        }

        .navbar-menu a:hover::after {
            width: 100%;
        }

        .navbar-cta {
            background: linear-gradient(135deg, #4a9c6e 0%, #3d8c5e 100%);
            color: white !important;
            padding: 10px 25px !important;
            border-radius: 30px;
            transition: all 0.3s ease !important;
        }

        .navbar-cta:hover {
            background: linear-gradient(135deg, #5ecc7a 0%, #4a9c6e 100%) !important;
            transform: translateY(-2px);
        }

        .navbar-cta::after {
            display: none !important;
        }

        .navbar-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
        }

        .navbar-toggle span {
            width: 28px;
            height: 3px;
            background: #7dd87d;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Language Selector */
        .language-selector {
            position: relative;
            margin-left: auto;
        }

        .language-dropdown {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(77, 156, 110, 0.15);
            border: 1.5px solid rgba(77, 156, 110, 0.3);
            border-radius: 25px;
            color: #c5f0c5;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .language-dropdown:hover {
            background: rgba(77, 156, 110, 0.25);
            border-color: #4a9c6e;
            color: #7dd87d;
        }

        .language-flag {
            font-size: 1.2em;
        }

        .language-arrow {
            font-size: 0.7em;
            transition: transform 0.3s ease;
        }

        .language-dropdown.active .language-arrow {
            transform: rotate(180deg);
        }

        .language-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(13, 40, 24, 0.98);
            border: 1.5px solid rgba(77, 156, 110, 0.3);
            border-radius: 12px;
            min-width: 160px;
            padding: 8px 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1001;
            backdrop-filter: blur(10px);
        }

        .language-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .language-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            color: #c5f0c5;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .language-option:hover {
            background: rgba(77, 156, 110, 0.15);
            color: #7dd87d;
        }

        .language-option.active {
            background: rgba(77, 156, 110, 0.2);
            color: #7dd87d;
        }

        .language-option-flag {
            font-size: 1.3em;
        }

        .language-option-code {
            font-weight: 600;
            color: #7dd87d;
            min-width: 35px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 3px solid #4a9c6e;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        h1 {
            font-size: 3.5em;
            color: #7dd87d;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #a8e6a1;
            font-style: italic;
        }

        .category {
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 2px solid #3d8c5e;
            transition: transform 0.3s ease;
        }

        .category:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(77, 156, 110, 0.3);
        }

        .category-title {
            font-size: 2.2em;
            color: #5ecc7a;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4a9c6e;
            text-transform: capitalize;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-title::before {
            content: '🌿';
            font-size: 0.8em;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .menu-item {
            background: linear-gradient(145deg, #2a5c3a 0%, #1e4530 100%);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid #4a9c6e;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .menu-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(77, 156, 110, 0.45);
        }

        .menu-item-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid #3d8c5e;
            transition: transform 0.5s ease;
        }

        .menu-item:hover .menu-item-image {
            transform: scale(1.08);
        }

        .menu-item-name {
            padding: 18px 18px 8px;
            font-size: 1.15em;
            color: #c5f0c5;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(180deg, rgba(26, 69, 48, 0.6) 0%, rgba(20, 55, 38, 0.8) 100%);
        }

        .menu-item-price {
            padding: 0 18px 18px;
            font-size: 1.05em;
            color: #7dd87d;
            text-align: center;
            font-weight: 700;
            background: linear-gradient(180deg, rgba(20, 55, 38, 0.8) 0%, rgba(26, 69, 48, 0.6) 100%);
        }

        .menu-item-details {
            padding: 10px 18px;
            font-size: 0.85em;
            color: #a8e6a1;
            text-align: center;
            font-style: italic;
            background: linear-gradient(180deg, rgba(13, 40, 24, 0.9) 0%, rgba(20, 55, 38, 0.7) 100%);
            border-top: 1px solid rgba(77, 156, 110, 0.2);
        }

        /* Modal for description */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a4a2e 0%, #0d2818 100%);
            border: 2px solid #4a9c6e;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(77, 156, 110, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(77, 156, 110, 0.2);
            border: 1.5px solid rgba(77, 156, 110, 0.4);
            color: #7dd87d;
            font-size: 1.5em;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(77, 156, 110, 0.4);
            transform: scale(1.1);
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            color: #7dd87d;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4a9c6e;
        }

        .modal-price {
            font-size: 1.4em;
            color: #5ecc7a;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-description {
            font-size: 1em;
            color: #c5f0c5;
            line-height: 1.7;
        }

        .modal-description strong {
            color: #7dd87d;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-icon {
            font-size: 0.6em;
        }

        .drink-subcategory {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #4a9c6e;
        }

        .drink-subcategory:first-child {
            margin-top: 10px;
            padding-top: 10px;
            border-top: none;
        }

        .drink-subcategory-title {
            font-size: 1.6em;
            color: #6fd483;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #5ecc7a;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .drink-subcategory-title::before {
            content: '🥤';
            font-size: 0.7em;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 2px solid #4a9c6e;
            color: #8fc98f;
            font-size: 0.9em;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
        }

         @media (max-width: 768px) {
             .navbar-menu {
                 position: fixed;
                 top: 160px;
                 left: 0;
                 right: 0;
                 background: rgba(13, 40, 24, 0.98);
                 flex-direction: column;
                 padding: 30px;
                 gap: 20px;
                 transform: translateY(-150%);
                 opacity: 0;
                 transition: all 0.3s ease;
                 border-bottom: 2px solid rgba(77, 156, 110, 0.3);
                 z-index: 998;
             }

             .navbar-menu.active {
                 transform: translateY(0);
                 opacity: 1;
             }

             .navbar-toggle {
                 display: flex;
                 z-index: 1002;
             }

             .category-nav {
                 top: 100px;
             }

             .category-title {
                 font-size: 1.6em;
             }

             .menu-grid {
                 grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                 gap: 15px;
             }

             .drink-subcategory-title {
                 font-size: 1.3em;
             }

             .container {
                 padding-top: 170px;
             }

             .category-nav-list {
                 display: flex;
                 gap: 6px;
                 justify-content: flex-start;
                 flex-wrap: nowrap;
                 max-width: 1400px;
                 margin: 0 auto;
                 padding: 0 15px;
                 width: max-content;
                 overflow-x: auto;
                 scroll-snap-type: x mandatory;
             }

             .category-nav-item {
                 display: inline-flex;
                 align-items: center;
                 padding: 10px 16px;
                 background: rgba(77, 156, 110, 0.2);
                 border: 1.5px solid rgba(77, 156, 110, 0.4);
                 border-radius: 20px;
                 color: #c5f0c5;
                 font-size: 0.85em;
                 font-weight: 500;
                 cursor: pointer;
                 transition: all 0.3s ease;
                 text-transform: capitalize;
                 letter-spacing: 0.3px;
                 white-space: nowrap;
                 user-select: none;
                 -webkit-tap-highlight-color: transparent;
                 scroll-snap-align: start;
             }
         } /* close 768px media query */

        @media (max-width: 480px) {
            .category-title {
                font-size: 1.3em;
            }

            .menu-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .menu-item-image {
                height: 280px;
            }

            .drink-subcategory-title {
                font-size: 1.1em;
            }

            .navbar-logo {
                font-size: 1.6em;
            }

            .language-dropdown {
                padding: 6px 12px;
                font-size: 0.8em;
            }

            .language-flag {
                font-size: 1em;
            }
        }

    </style>
    </head>

        <div class="container">

    <!-- Modal for item description -->
    <div class="modal-overlay" id="descriptionModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <h3 class="modal-title" id="modalTitle"></h3>
            <p class="modal-price" id="modalPrice"></p>
            <p class="modal-description" id="modalDescription"></p>
        </div>
    </div>

    <script>


        // Helper function to convert category name to display name
        function formatCategoryName(category) {
            const names = {
                'breakfasts': 'Breakfasts',
                'salads': 'Salads',
                'soups': 'Soups',
                'meat dishes': 'Meat Dishes',
                'fish': 'Fish',
                'pastas': 'Pastas',
                'burgers': 'Burgers',
                'bruschettas': 'Bruschettas',
                'appetizers': 'Appetizers',
                'for groups': 'For Groups',
                'pizza': 'Pizza',
                'desserts': 'Desserts',
                'drinks': 'Drinks'
            };
            return names[category] || category;
        }

         // Function to get image path for a dish
        function getImagePath(category, item) {
            let fileName = item;

            const categoryFolderMap = {
                'breakfasts': 'breakfasts',
                'salads': 'salads',
                'soups': 'soups',
                'meat dishes': 'meat dishes',
                'fish': 'fish',
                'pastas': 'pastas',
                'burgers': 'burgers',
                'bruschettas': 'bruschettas',
                'appetizers': 'appetizers',
                'for groups': 'for groups',
                'pizza': 'pizza',
                'desserts': 'desserts'
            };

            const folder = categoryFolderMap[category];
            if (!folder) return null;

            return `menu_images/${folder}/${fileName}.jpg`;
        }

        // Helper to normalize item names for lookup
        function normalizeName(name) {
            return name.toLowerCase()
                .replace(/\s+/g, ' ')
                .replace(/\b0[.,]\d+\b/g, m => m.replace(',', '.'))
                .replace(/\b\d+[,.]\d+\s*л\b/g, '')
                .replace(/\s*\([^)]*\)/g, '')

        // Function to create a single menu item element
        function createMenuItem(category, item) {
            const div = document.createElement('div');
            div.className = 'menu-item';

            const img = document.createElement('img');
            img.className = 'menu-item-image';
            const imagePath = getImagePath(category, item);

            if (imagePath) {
                img.src = imagePath;
                img.alt = item;
                img.onerror = function() {
                    this.style.display = 'none';
                };
            }
            div.appendChild(img);

            const nameDiv = document.createElement('div');
            nameDiv.className = 'menu-item-name';
            nameDiv.textContent = item;
            div.appendChild(nameDiv);

            // Add price
            const itemDetails = getItemDetails();
            const normalizedKey = normalizeName(item);
            const details = itemDetails[normalizedKey];
            if (details && details.price) {
                const priceDiv = document.createElement('div');
                priceDiv.className = 'menu-item-price';
                priceDiv.textContent = details.price;
                div.appendChild(priceDiv);
            }

            // Add click handler for description
            if (details) {
                div.addEventListener('click', function() {
                    showModal(item, details);
                });
            } else {
                div.style.cursor = 'default';
            }

            return div;
        }

        // Function to create category section with unique ID
        function createCategorySection(category, items) {
            const section = document.createElement('section');
            section.className = 'category';
            const categoryId = category.replace(/\s+/g, '-');
            section.id = `category-${categoryId}`;

            const title = document.createElement('h2');
            title.className = 'category-title';
            const dashedKey = category.replace(/\s+/g, '-');
            title.innerHTML = `<span class="category-header" data-category-key="${dashedKey}">${formatCategoryName(category)}</span>`;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'menu-grid';

            items.forEach(item => {
                const menuItem = createMenuItem(category, item);
                grid.appendChild(menuItem);
            });

            section.appendChild(grid);
            return section;
        }

        function renderDrinksSection(menuData) {
            const section = document.createElement('section');
            section.className = 'category';
            section.id = 'category-drinks';

            const title = document.createElement('h2');
            title.className = 'category-title';
            title.innerHTML = `<span class="category-header">Drinks</span>`;

                { key: 'tea_coffee', label: 'Tea & Coffee' },

                const subCatDiv = document.createElement('div');
                subCatDiv.className = 'drink-subcategory';

                const subCatTitle = document.createElement('h3');
                subCatTitle.className = 'drink-subcategory-title';
                subCatTitle.setAttribute('data-drink-key', subCategory.key);
                subCatTitle.textContent = subCategory.label;
                subCatDiv.appendChild(subCatTitle);

                const subGrid = document.createElement('div');
                subGrid.className = 'menu-grid';

                subCatData.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'menu-item';

                    const img = document.createElement('img');
                    img.className = 'menu-item-image';
                    img.src = `menu_images/drinks/${subCategory.key}/${item}.jpg`;
                    img.alt = item;
                    img.onerror = function() {
                        this.style.display = 'none';
                    };
                    div.appendChild(img);

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'menu-item-name';
                    nameDiv.textContent = item;
                    div.appendChild(nameDiv);

                    // Add price
                    const itemDetails = getItemDetails();
                    const normalizedKey = normalizeName(item);
                    const details = itemDetails[normalizedKey];
                    if (details && details.price) {
                        const priceDiv = document.createElement('div');
                        priceDiv.className = 'menu-item-price';
                        priceDiv.textContent = details.price;
                        div.appendChild(priceDiv);
                    }

                    // Add click handler for description
                    if (details) {
                        div.addEventListener('click', function() {
                            showModal(item, details);

                    } else {
                        div.style.cursor = 'default';
                    }

                    subGrid.appendChild(div);
                });

                subCatDiv.appendChild(subGrid);
                section.appendChild(subCatDiv);
            });

            return section;
        }

         // Initialize category filter
        function initCategoryFilter() {
            const navButtons = document.querySelectorAll('.category-nav-item');
            const sections = document.querySelectorAll('.category');

            navButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    const category = this.getAttribute('data-category');

                    // Update active button
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');

                    // Filter sections
                    sections.forEach(section => {
                        if (category === 'all') {
                            section.style.display = 'block';
                        } else {
                            const sectionId = section.id.replace('category-', '');
                            if (sectionId === category) {
                                section.style.display = 'block';
                            } else {
                                section.style.display = 'none';
                            }
                        }
                    });

                    // Scroll to top of menu container smoothly
                    setTimeout(() => {
                        const container = document.getElementById('menu-container');
                        if (container) {
                            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    }, 100);
                });
            });
        }

            const navbar = document.getElementById('navbar');

                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        const navbarToggle = document.getElementById('navbarToggle');
        const navbarMenu = document.getElementById('navbarMenu');

        if (navbarToggle && navbarMenu) {
            navbarToggle.addEventListener('click', function() {
                navbarMenu.classList.toggle('active');
            });

                link.addEventListener('click', () => {
                    navbarMenu.classList.remove('active');

                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        document.addEventListener('DOMContentLoaded', function() {
            buildMenu();

            // ========== TRANSLATIONS ==========

                    quickLinks: {

                        about: "О Нас",

                    }
                },
                kaz: {
                    subtitle: "Сәнді де Жасанган Тамақ Табысы",
                    categories: {
                        'breakfasts': 'Жейтұлым',
                        'salads': 'Салаттар',

                        'meat-dishes': 'Ет Тағамдары',
                        'fish': 'Балық',

                        'burgers': 'Бургерлер',

            // Language switcher functionality
            const languageDropdown = document.getElementById('languageDropdown');
            const languageMenu = document.getElementById('languageMenu');
            const currentFlag = document.getElementById('currentFlag');
            const currentCode = document.getElementById('currentCode');
            const languageOptions = document.querySelectorAll('.language-option');

            // Load saved language or default to 'eng'
            let currentLang = localStorage.getItem('tavola-verde-lang') || 'eng';

            function updateLanguageDisplay(lang) {
                const flagMap = {
                    'eng': '🇬🇧',
                    'rus': '🇷🇺',
                    'kaz': '🇰🇿'
                };
                const codeMap = {
                    'eng': 'ENG',
                    'rus': 'RUS',
                    'kaz': 'KAZ'
                };

                currentFlag.textContent = flagMap[lang];
                currentCode.textContent = codeMap[lang];

                languageOptions.forEach(opt => {
                    opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
                });
            }

            function applyTranslations(lang) {
                const trans = translations[lang];
                if (!trans) return;

                // Update subtitle
                document.querySelector('.subtitle').textContent = trans.subtitle;

                // Update category titles using data-category-key
                document.querySelectorAll('[data-category-key]').forEach(el => {
                    const key = el.getAttribute('data-category-key');
                    if (trans.categories[key]) {
                        el.textContent = trans.categories[key];
                    }
                });

                // Update category filter nav buttons
                document.querySelectorAll('.category-nav-item').forEach(btn => {
                    let key = btn.getAttribute('data-category');
                    if (key === 'all') {
                        btn.textContent = trans.all;
                    } else {
                        // Convert dashes to spaces to match translation keys
                        key = key.replace(/-/g, ' ');
                        if (trans.categories[key]) {
                            btn.textContent = trans.categories[key];
                        }
                    }
                });

                // Update drink subcategory titles using data-drink-key
                document.querySelectorAll('[data-drink-key]').forEach(el => {
                    const key = el.getAttribute('data-drink-key');
                    if (trans.drinkCategories[key]) {
                        el.textContent = trans.drinkCategories[key];
                    }
                });

                // Update footer
                document.querySelector('footer p').textContent = trans.footerText;

                // Translate navbar menu
                const navLinks = document.querySelectorAll('.navbar-menu a');
                if (navLinks.length >= 4) {
                    navLinks[0].textContent = trans.quickLinks.home;
                    navLinks[1].textContent = trans.quickLinks.about;
                    navLinks[2].textContent = trans.quickLinks.reviews;
                    navLinks[3].textContent = trans.quickLinks.menu;
                }
            }

            // Toggle language menu
            languageDropdown.addEventListener('click', (e) => {
                e.stopPropagation();
                languageMenu.classList.toggle('active');
                languageDropdown.classList.toggle('active');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', () => {
                languageMenu.classList.remove('active');
                languageDropdown.classList.remove('active');
            });

            languageMenu.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // Language option click handler
            languageOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const lang = option.getAttribute('data-lang');
                    currentLang = lang;
                    localStorage.setItem('tavola-verde-lang', lang);
                    updateLanguageDisplay(lang);
                    applyTranslations(lang);
                });
            });

            // Initialize language on load
            updateLanguageDisplay(currentLang);
            applyTranslations(currentLang);

            // Touch swipe support for category nav
            const categoryNav = document.getElementById('categoryNav');
            let isDown = false;
            let startX;
            let scrollLeft;

            if (categoryNav) {
                categoryNav.addEventListener('touchstart', (e) => {
                    isDown = true;
                    startX = e.touches[0].pageX - categoryNav.offsetLeft;
                    scrollLeft = categoryNav.scrollLeft;
                }, { passive: true });

                categoryNav.addEventListener('touchmove', (e) => {
                    if (!isDown) return;
                    const x = e.touches[0].pageX - categoryNav.offsetLeft;
                    const walk = (x - startX) * 1.5;
                    categoryNav.scrollLeft = scrollLeft - walk;
                }, { passive: true });

                categoryNav.addEventListener('touchend', () => {
                    isDown = false;
                });
            }

            // ========== MODAL FUNCTIONALITY ==========
            const modal = document.getElementById('descriptionModal');
            const modalClose = document.getElementById('modalClose');
            const modalTitle = document.getElementById('modalTitle');
            const modalPrice = document.getElementById('modalPrice');
            const modalDescription = document.getElementById('modalDescription');

            function showModal(title, details) {
                modalTitle.textContent = title;
                modalPrice.textContent = details.price || 'Цена по запросу';
                modalDescription.innerHTML = details.desc ? details.desc.replace(/\n/g, '<br>') : '';

                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }

            // Close on button click
            modalClose.addEventListener('click', closeModal);

            // Close on overlay click
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // Close on escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });
        });
